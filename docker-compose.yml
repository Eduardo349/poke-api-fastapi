services:
  db:
    image: postgres:15-alpine
    container_name: poke_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pokebase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pokebase"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: poke_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/pokebase
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
